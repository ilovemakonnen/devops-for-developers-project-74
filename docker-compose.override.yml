
version: "3.9"

services:
  app:
    command: make dev
    image: ilovemakonnen/devops-for-developers-project-74
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:password@db:5432/blog
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
volumes:
  caddy_data:
  caddy_config: