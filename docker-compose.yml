version: "3.9"

services:
 app:
  build:
    context: .
    dockerfile: Dockerfile.production
    command: make dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "8080"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: