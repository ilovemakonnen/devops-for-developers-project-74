version: "3.9"

services:
  app:
    image: ilovemakonnen/devops-for-developers-project-74
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DATABASE_NAME: blog
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
      DATABASE_PORT: 5432
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: js-fastify-blog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: