version: "3.9"

services:
  app:
    image: ilovemakonnen/devops-for-developers-project-74
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:password@db:5432/blog

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app